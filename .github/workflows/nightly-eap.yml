name: Nightly EAP Compatibility Check

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  eap-compatibility:
    name: EAP Compatibility
    uses: ./.github/workflows/reusable-verify.yml
    with:
      artifact_prefix: nightly-eap
      matrix_targets: unit-tests,plugin-verifier,eap-ui

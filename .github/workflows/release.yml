name: Release Plugin

on: [workflow_dispatch]

concurrency:
  group: release-plugin
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true

    - name: Fetch Sources
      uses: actions/checkout@v6.0.2

    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@v6

    - name: Setup Java
      uses: actions/setup-java@v5.2.0
      with:
        distribution: corretto
        java-version: 21
        cache: gradle

    - name: Install Xvfb
      run: sudo apt-get update && sudo apt-get install -y xvfb

    - name: Export Properties
      id: properties
      shell: bash
      run: |
        PROPERTIES="$(./gradlew properties --console=plain -q)"
        VERSION="$(echo "$PROPERTIES" | grep "^version:" | cut -f2- -d ' ')"
        echo "version=$(echo $VERSION)" >> $GITHUB_OUTPUT

    - name: Run Tests
      run: ./gradlew test

    - name: Run UI Integration Tests
      run: xvfb-run -a ./gradlew integrationTestMatrix --stacktrace --info --no-daemon

    - name: Run Plugin Verification
      run: ./gradlew verifyPlugin -Pplugin.verifier.home.dir=~/.pluginVerifier

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: release-test-results
        path: |
          build/test-results/
          build/reports/tests/
          out/ide-tests/tests/
        if-no-files-found: warn
      
    - name: Prepare Plugin Artifact
      id: artifact
      shell: bash
      run: |
        cd ${{ github.workspace }}/build/distributions
        FILENAME=`ls *.zip`
        CUT_FILENAME=${FILENAME:0:-4}
        echo "filename=$(echo $CUT_FILENAME)" >> $GITHUB_OUTPUT
      
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.artifact.outputs.filename }}
        path: ./build/distributions/

    - name: Publish Plugin
      env:
        PUBLISH_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
      run: ./gradlew publishPlugin

    - name: Create Release
      uses: softprops/action-gh-release@v2.6.1
      with:
        tag_name: v${{ steps.properties.outputs.version }}
        name: v${{ steps.properties.outputs.version }}
        draft: false
        prerelease: false

    - name: Check Disk Space
      if: always()
      run: df -h

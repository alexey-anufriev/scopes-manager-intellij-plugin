name: Release Plugin

on: [workflow_dispatch]

permissions:
  contents: write

concurrency:
  group: release-plugin
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release Candidate
    uses: ./.github/workflows/reusable-verify.yml
    with:
      artifact_prefix: release
      matrix_targets: full

  release:
    needs:
    - verify
    runs-on: ubuntu-latest

    steps:
    - name: Fetch Sources
      uses: actions/checkout@v7.0.1

    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@v6

    - name: Setup Java
      uses: actions/setup-java@v5.6.0
      with:
        distribution: corretto
        java-version: 21
        cache: gradle

    - name: Export Properties
      id: properties
      shell: bash
      run: |
        set -euo pipefail
        PROPERTIES="$(./gradlew properties --console=plain -q)"
        VERSION="$(echo "$PROPERTIES" | grep "^version:" | cut -f2- -d ' ')"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Download Plugin Archive
      uses: actions/download-artifact@v8
      with:
        name: release-plugin-archive
        path: build/distributions

    - name: Prepare Plugin Artifact
      id: artifact
      shell: bash
      run: |
        set -euo pipefail
        cd "${{ github.workspace }}/build/distributions"

        mapfile -t archives < <(find . -maxdepth 1 -type f -name '*.zip' -printf '%f\n' | sort)
        if [ "${#archives[@]}" -ne 1 ]; then
          echo "Expected exactly one plugin archive, found ${#archives[@]}:" >&2
          printf '%s\n' "${archives[@]}" >&2
          exit 1
        fi

        filename="${archives[0]}"
        echo "filename=${filename%.zip}" >> "$GITHUB_OUTPUT"
        echo "archive_path=${{ github.workspace }}/build/distributions/$filename" >> "$GITHUB_OUTPUT"
      
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ steps.artifact.outputs.filename }}
        path: ./build/distributions/

    - name: Publish Plugin
      env:
        PUBLISH_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
      run: ./gradlew publishPlugin -PbuiltPluginArchive="${{ steps.artifact.outputs.archive_path }}"

    - name: Create Release
      uses: softprops/action-gh-release@v3.0.2
      with:
        tag_name: v${{ steps.properties.outputs.version }}
        name: v${{ steps.properties.outputs.version }}
        draft: false
        prerelease: false
        files: ${{ steps.artifact.outputs.archive_path }}

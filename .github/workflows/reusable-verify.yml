name: Reusable Verify

on:
  workflow_call:
    inputs:
      artifact_prefix:
        required: true
        type: string
      matrix_targets:
        required: false
        type: string
        default: full

jobs:
  prepare:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select-matrix.outputs.matrix }}

    steps:
    - name: Select Verification Matrix
      id: select-matrix
      shell: bash
      run: |
        ALL_MATRIX='[
          {"name":"unit-tests","command":"./gradlew test","artifact_suffix":"unit-tests","containerized":false},
          {"name":"plugin-verifier","command":"./gradlew verifyPlugin","artifact_suffix":"plugin-verifier","containerized":false},
          {"name":"legacy-integration-idea-2025-3","command":"./gradlew integrationTest2025_3 --stacktrace --info --no-daemon","artifact_suffix":"legacy-integration-idea-2025-3","containerized":true,"groups":["legacy-integration","integration"]},
          {"name":"stable-integration-idea","command":"./gradlew integrationTestIdeaLatestRelease --stacktrace --info --no-daemon","artifact_suffix":"stable-integration-idea","containerized":true,"groups":["stable-integration","integration"]},
          {"name":"stable-integration-clion","command":"./gradlew integrationTestCLionLatest --stacktrace --info --no-daemon","artifact_suffix":"stable-integration-clion","containerized":true,"groups":["stable-integration","integration"]},
          {"name":"stable-integration-goland","command":"./gradlew integrationTestGoLandLatest --stacktrace --info --no-daemon","artifact_suffix":"stable-integration-goland","containerized":true,"groups":["stable-integration","integration"]},
          {"name":"stable-integration-pycharm","command":"./gradlew integrationTestPyCharmLatest --stacktrace --info --no-daemon","artifact_suffix":"stable-integration-pycharm","containerized":true,"groups":["stable-integration","integration"]},
          {"name":"stable-integration-rider","command":"./gradlew integrationTestRiderLatest --stacktrace --info --no-daemon","artifact_suffix":"stable-integration-rider","containerized":true,"groups":["stable-integration","integration"]},
          {"name":"stable-integration-rubymine","command":"./gradlew integrationTestRubyMineLatest --stacktrace --info --no-daemon","artifact_suffix":"stable-integration-rubymine","containerized":true,"groups":["stable-integration","integration"]},
          {"name":"stable-integration-rustrover","command":"./gradlew integrationTestRustRoverLatest --stacktrace --info --no-daemon","artifact_suffix":"stable-integration-rustrover","containerized":true,"groups":["stable-integration","integration"]},
          {"name":"stable-integration-webstorm","command":"./gradlew integrationTestWebStormLatest --stacktrace --info --no-daemon","artifact_suffix":"stable-integration-webstorm","containerized":true,"groups":["stable-integration","integration"]},
          {"name":"eap-integration-idea","command":"./gradlew integrationTestIdeaLatestEap --stacktrace --info --no-daemon","artifact_suffix":"eap-integration-idea","containerized":true,"groups":["eap-integration","integration"]},
          {"name":"eap-integration-clion","command":"./gradlew integrationTestCLionLatestEap --stacktrace --info --no-daemon","artifact_suffix":"eap-integration-clion","containerized":true,"groups":["eap-integration","integration"]},
          {"name":"eap-integration-goland","command":"./gradlew integrationTestGoLandLatestEap --stacktrace --info --no-daemon","artifact_suffix":"eap-integration-goland","containerized":true,"groups":["eap-integration","integration"]},
          {"name":"eap-integration-pycharm","command":"./gradlew integrationTestPyCharmLatestEap --stacktrace --info --no-daemon","artifact_suffix":"eap-integration-pycharm","containerized":true,"groups":["eap-integration","integration"]},
          {"name":"eap-integration-rider","command":"./gradlew integrationTestRiderLatestEap --stacktrace --info --no-daemon","artifact_suffix":"eap-integration-rider","containerized":true,"groups":["eap-integration","integration"]},
          {"name":"eap-integration-rubymine","command":"./gradlew integrationTestRubyMineLatestEap --stacktrace --info --no-daemon","artifact_suffix":"eap-integration-rubymine","containerized":true,"groups":["eap-integration","integration"]},
          {"name":"eap-integration-rustrover","command":"./gradlew integrationTestRustRoverLatestEap --stacktrace --info --no-daemon","artifact_suffix":"eap-integration-rustrover","containerized":true,"groups":["eap-integration","integration"]},
          {"name":"eap-integration-webstorm","command":"./gradlew integrationTestWebStormLatestEap --stacktrace --info --no-daemon","artifact_suffix":"eap-integration-webstorm","containerized":true,"groups":["eap-integration","integration"]}
        ]'

        if [ "${{ inputs.matrix_targets }}" = "full" ]; then
          MATRIX="$ALL_MATRIX"
        else
          TARGETS="${{ inputs.matrix_targets }}"
          MATRIX="$(printf '%s' "$ALL_MATRIX" | jq -c --arg targets "$TARGETS" '($targets | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))) as $selected | [.[] | select((.name as $name | $selected | index($name)) or ((.groups // []) | any(. as $group | $selected | index($group))))]')"
        fi

        {
          echo 'matrix<<EOF'
          echo "$MATRIX"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Trace Selected Matrix
      shell: bash
      run: |
        echo "artifact_prefix=${{ inputs.artifact_prefix }}"
        echo "matrix_targets=${{ inputs.matrix_targets }}"
        echo "selected_matrix=${{ steps.select-matrix.outputs.matrix }}"

  build:
    name: Build Plugin Artifact
    needs: prepare
    runs-on: ubuntu-latest

    steps:
    - name: Fetch Sources
      uses: actions/checkout@v7.0.0

    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@v6

    - name: Setup Java
      uses: actions/setup-java@v5.3.0
      with:
        distribution: corretto
        java-version: 21
        cache: gradle

    - name: Build Plugin Outputs
      run: ./gradlew buildPlugin

    - name: Trace Build Outputs
      shell: bash
      run: |
        echo "build_distributions:"
        ls -lah build/distributions

    - name: Upload Plugin Archive
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact_prefix }}-plugin-archive
        path: build/distributions/*.zip
        if-no-files-found: error

  verify:
    name: Verify ${{ matrix.name }}
    needs:
    - prepare
    - build
    if: ${{ needs.prepare.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
    - name: Fetch Sources
      uses: actions/checkout@v7.0.0

    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@v6

    - name: Setup Java
      uses: actions/setup-java@v5.3.0
      with:
        distribution: corretto
        java-version: 21
        cache: gradle

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Download Plugin Archive
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.artifact_prefix }}-plugin-archive
        path: .ci/plugin-archive

    - name: Trace Downloaded Artifact
      shell: bash
      run: |
        echo "downloaded_artifact_name=${{ inputs.artifact_prefix }}-plugin-archive"
        echo "downloaded_files:"
        find "$GITHUB_WORKSPACE/.ci/plugin-archive" -maxdepth 2 -type f -print | sort

    - name: Resolve Built Plugin Paths
      shell: bash
      run: |
        set -euo pipefail

        BUILT_PLUGIN_ARCHIVE="$(find "$GITHUB_WORKSPACE/.ci/plugin-archive" -type f -name '*.zip' | head -n 1)"
        if [ -z "$BUILT_PLUGIN_ARCHIVE" ]; then
          echo "Built plugin archive not found under $GITHUB_WORKSPACE/.ci/plugin-archive" >&2
          exit 1
        fi

        EXTRACT_DIR="$GITHUB_WORKSPACE/.ci/extracted-plugin"
        rm -rf "$EXTRACT_DIR"
        mkdir -p "$EXTRACT_DIR"
        unzip -q "$BUILT_PLUGIN_ARCHIVE" -d "$EXTRACT_DIR"

        BUILT_PLUGIN_DIR="$(find "$EXTRACT_DIR" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
        if [ -z "$BUILT_PLUGIN_DIR" ]; then
          echo "Built plugin directory not found after extracting $BUILT_PLUGIN_ARCHIVE" >&2
          exit 1
        fi

        echo "BUILT_PLUGIN_ARCHIVE=$BUILT_PLUGIN_ARCHIVE" >> "$GITHUB_ENV"
        echo "BUILT_PLUGIN_DIR=$BUILT_PLUGIN_DIR" >> "$GITHUB_ENV"
        echo "BUILT_PLUGIN_DIR_CONTAINER=.ci/extracted-plugin/$(basename "$BUILT_PLUGIN_DIR")" >> "$GITHUB_ENV"

        echo "built_plugin_archive=$BUILT_PLUGIN_ARCHIVE"
        echo "built_plugin_dir=$BUILT_PLUGIN_DIR"
        echo "built_plugin_dir_container=.ci/extracted-plugin/$(basename "$BUILT_PLUGIN_DIR")"
        echo "extracted_plugin_contents:"
        find "$BUILT_PLUGIN_DIR" -maxdepth 2 -print | sort

    - name: Free Runner Disk Space
      if: ${{ matrix.containerized == true }}
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: true

    - name: Check Disk Space
      run: df -h

    - name: Run Verification Task
      shell: bash
      run: |
        set -euo pipefail

        echo "matrix_name=${{ matrix.name }}"
        echo "matrix_command=${{ matrix.command }}"
        echo "matrix_artifact_suffix=${{ matrix.artifact_suffix }}"
        echo "matrix_containerized=${{ matrix.containerized }}"
        echo "built_plugin_dir_container=${BUILT_PLUGIN_DIR_CONTAINER:-}"

        read -r -a cmd <<< "${{ matrix.command }}"
        if [ "${{ matrix.name }}" = "plugin-verifier" ]; then
          cmd+=("-Pplugin.verifier.home.dir=$HOME/.pluginVerifier")
          cmd+=("-PbuiltPluginArchive=$BUILT_PLUGIN_ARCHIVE")
        fi
        if [ "${{ matrix.containerized }}" = "true" ]; then
          cmd+=("-PbuiltPluginDir=$BUILT_PLUGIN_DIR_CONTAINER")
        fi

        echo "resolved_command=${cmd[*]}"

        mkdir -p "$GITHUB_WORKSPACE/.ci/verify-logs"
        LOG_FILE="$GITHUB_WORKSPACE/.ci/verify-logs/${{ matrix.artifact_suffix }}.log"
        : > "$LOG_FILE"

        run_verification_command() {
          if [ "${{ matrix.containerized }}" = "true" ]; then
            scripts/run-isolated-integration-test.sh "${cmd[@]:1}"
          else
            "${cmd[@]}"
          fi
        }

        max_attempts=1
        if [ "${{ matrix.containerized }}" = "true" ]; then
          max_attempts=2
        fi

        attempt=1
        while [ "$attempt" -le "$max_attempts" ]; do
          echo "verification_attempt=$attempt/$max_attempts" | tee -a "$LOG_FILE"

          set +e
          run_verification_command 2>&1 | tee -a "$LOG_FILE"
          command_status=${PIPESTATUS[0]}
          set -e

          if [ "$command_status" -eq 0 ]; then
            break
          fi

          if [ "$attempt" -eq "$max_attempts" ]; then
            exit "$command_status"
          fi

          echo "Verification attempt $attempt failed with exit code $command_status; retrying in 90 seconds." | tee -a "$LOG_FILE"
          sleep 90
          attempt=$((attempt + 1))
        done

        FORBIDDEN_TASKS='^> Task :(buildPlugin|prepareSandbox)( |$)'
        if grep -Eq "$FORBIDDEN_TASKS" "$LOG_FILE"; then
          echo "Forbidden rebuild task execution detected in verify job:" >&2
          grep -En "$FORBIDDEN_TASKS" "$LOG_FILE" >&2
          exit 1
        fi

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact_prefix }}-test-results-${{ matrix.artifact_suffix }}
        path: |
          build/test-results/
          build/reports/tests/
          out/ide-tests/tests/
          .ci/container-test-results/
          .ci/verify-logs/${{ matrix.artifact_suffix }}.log
        if-no-files-found: warn
